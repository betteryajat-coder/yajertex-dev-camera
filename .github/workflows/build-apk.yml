name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # Scaffold the Android project skeleton (gradle wrapper, MainActivity,
      # build.gradle, etc.). Existing Dart source is left untouched.
      - name: Scaffold Android project
        run: |
          flutter create --project-name yajertex_dev_camera \
                         --org com.yajertex \
                         --platforms=android \
                         .

      # Overlay our custom AndroidManifest.xml (adds camera + location
      # permissions that flutter create doesn't include by default).
      - name: Apply custom AndroidManifest
        run: |
          cp android-patches/AndroidManifest.xml \
             android/app/src/main/AndroidManifest.xml

      - name: Pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yajertex-dev-camera-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
