name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # Rasterize the brand SVG to a 1024x1024 PNG for flutter_launcher_icons.
      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Convert logo SVG to PNG
        run: |
          rsvg-convert -w 1024 -h 1024 assets/icon/icon.svg -o assets/icon/icon.png
          ls -la assets/icon/

      # Scaffold the Android project skeleton (gradle wrapper, MainActivity,
      # build.gradle, etc.). Existing Dart source is left untouched.
      - name: Scaffold Android project
        run: |
          flutter create --project-name yajatxdev_geo \
                         --org com.yajatxdev \
                         --platforms=android \
                         .

      # Overlay our custom AndroidManifest.xml (adds camera + location
      # permissions + the "YajatXDev Geo" app label).
      - name: Apply custom AndroidManifest
        run: |
          cp android-patches/AndroidManifest.xml \
             android/app/src/main/AndroidManifest.xml

      # Scaffolded Kotlin pin is too low for the camera plugin.
      - name: Bump Kotlin plugin version
        run: |
          if [ -f android/settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle || true
          fi
          if [ -f android/build.gradle ]; then
            sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/" android/build.gradle || true
          fi

      - name: Pub get
        run: flutter pub get

      # Writes into android/app/src/main/res/mipmap-*/ic_launcher.png and
      # the adaptive-icon XML. Must run AFTER the Android scaffold exists.
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yajatxdev-geo-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
