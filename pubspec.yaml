name: yajertex_dev_camera
description: YajerTex Dev Camera — a premium camera app with GPS-stamped photos.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Camera & media
  camera: ^0.10.5+9
  image: ^4.1.7

  # Location
  geolocator: ^10.1.0

  # Permissions
  permission_handler: ^11.3.0

  # Storage & paths
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2

  # UI niceties
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
