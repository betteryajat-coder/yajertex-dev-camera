name: yajatxdev_geo
description: YajatXDev Geo — geo-tagged photography with editable society names.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Camera & imaging
  camera: ^0.10.5+9
  image: ^4.1.7

  # Location + reverse geocoding
  geolocator: ^10.1.0
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.3.0

  # Storage & paths
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1

  # Sharing saved captures with other apps
  share_plus: ^7.2.2

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#B8DEFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 24
